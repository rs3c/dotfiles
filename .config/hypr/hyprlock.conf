# pywal-generated colors (replaces matugen)
source = $HOME/.config/hypr/colors/hyprlock-colors.conf

# GENERAL
general {
    grace = 1
    hide_cursor = true
    ignore_empty_input = true
    text_trim = true
}

# BACKGROUND
background {
    path = screenshot
    blur_passes = 2
}

# CLOCK
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    font_family = JetBrainsMono Nerd Font
    font_size = 80
    color = $fg
    position = 0, 260
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] echo "<span>$(date +"%A, %d. %B")</span>"
    font_family = JetBrainsMono Nerd Font
    font_size = 18
    color = $on_primary
    position = 0, 180
    halign = center
    valign = center
}

# AVATAR — place ~/.face.icon here (90x90 circular)
image {
    monitor =
    path = $HOME/.face.icon
    size = 90
    rounding = -1
    border_size = 3
    border_color = $outline
    position = 0, 80
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 40
    rounding = -1

    outline_thickness = 3
    outer_color = $outline
    dots_center = true

    inner_color = $primary
    font_color = $on_primary
    fade_on_empty = false

    font_family = JetBrainsMono Nerd Font
    placeholder_text = <span>$USER</span>
    hide_input = false
    swap_font_color = true
    position = 0, -20
    halign = center
    valign = center
}

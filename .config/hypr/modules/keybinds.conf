###################
### KEYBINDINGS ###
###################

# Script directories
$hyprScripts = $HOME/.config/hypr/scripts
$scripts = $HOME/.config/scripts

# Super key
$mainMod = SUPER # Sets "Windows" key as main modifier

# Start programs
bind = $mainMod, T, exec, $terminal
bind = $mainMod, D, exec, $discord
bind = $mainMod, C, exec, $codeEditor
bind = $mainMod SHIFT, N, exec, $documentEditor
bind = $mainMod, N, exec, $notes
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $scripts/rofi/launcher.sh
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser --private-window

# Scripts
bind = $mainMod, E, exec, $hyprScripts/dropdown.sh yazi
bind = $mainMod SHIFT, T, exec, $hyprScripts/dropdown.sh taskwarrior
bind = $mainMod, A, exec, $scripts/rofi/ai/askai.sh
bind = $mainMod, P, exec, $scripts/rofi/install-launcher.sh
bind = $mainMod, G, exec, $scripts/rofi/wallpaper_switcher.sh
bind = $mainMod, M, exec, $scripts/rofi/mcp.sh
bind = $mainMod, R, exec, $scripts/rofi/resolution.sh
bind = , PRINT, exec, $scripts/snapshot.sh
bind = SHIFT, PRINT, exec, $scripts/screenrecord.sh

# Clipboard history
bind = $mainMod, V, exec, $scripts/rofi/clipboard.sh

# Night mode
bind = $mainMod, F9, exec, pkill hyprsunset || hyprsunset -t 4500
bind = $mainMod SHIFT, F9, exec, pkill hyprsunset
bind = $mainMod, F10, exec, pkill hyprsunset || hyprsunset -t 3000

# OS Operations
bind = $mainMod, F, fullscreen,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exec, $scripts/rofi/power.sh
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, S, exec, $scripts/rofi/wallpaper_switcher.sh --next

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# # Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness (via SwayOSD)
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# #####################
# ### LOOK AND FEEL ###
# #####################

# pywal colors input
source = $HOME/.config/hypr/modules/hyprland-pywal.conf

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    border_size = 3
    gaps_in = 5
    gaps_out = 8
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0

    shadow {
        enabled = true
        range = 20
        render_power = 4
        color = rgba(00000066)
        color_inactive = rgba(00000033)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.2
        vibrancy_darkness = 0.5
        new_optimizations = true
    }

    dim_inactive = true
    dim_strength = 0.05
    inactive_opacity = 0.95
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint

    # Tiling windows: slide in from direction
    animation = windows, 1, 3.5, easeOutQuint
    animation = windowsIn, 1, 3.0, easeOutQuint, slide
    animation = windowsOut, 1, 2.0, easeOutQuint, slide

    animation = fadeIn, 1, 2.0, almostLinear
    animation = fadeOut, 1, 1.5, almostLinear
    animation = fade, 1, 2.5, quick

    animation = layers, 1, 3.0, easeOutQuint
    animation = layersIn, 1, 3.5, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.5, almostLinear
    animation = fadeLayersOut, 1, 1.2, almostLinear

    # Workspace switch: horizontal slide
    animation = workspaces, 1, 3.0, easeOutQuint, slide
    animation = workspacesIn, 1, 3.0, easeOutQuint, slide
    animation = workspacesOut, 1, 2.5, easeOutQuint, slide
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

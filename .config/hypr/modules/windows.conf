##############################
### WINDOWS AND WORKSPACES ###
##############################

# swaync blur (full panel, makes sense to blur)
layerrule {
    name = blur-swaync
    match:namespace = ^swaync$
    blur = true
}

# See https://wiki.hypr.land/Configuring/Window-Rules/

# Ignore maximize requests from apps
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = xwayland-drag-fix
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    no_focus = on
}

# Dropdown terminal (yazi, btop, taskwarrior etc.)
windowrule {
    name = dropterm-rules
    match:class = ^(dropterm)$
    float = on
    size = 90% 80%
    center = on
}

# Floating utilities launched from waybar/rofi
windowrule {
    name = floating-waybar-rules
    match:class = ^(floating_waybar)$
    float = on
    size = 800 600
    center = on
}

windowrule {
    name = floating-generic-rules
    match:class = ^(floating)$
    float = on
    center = on
}

# AI response window
windowrule {
    name = askai-rules
    match:class = ^(askai)$
    float = on
    size = 800 600
    center = on
}

# Installer terminal
windowrule {
    name = installer-rules
    match:class = ^(installer)$
    float = on
    size = 900 650
    center = on
}

# MCP Management terminal (server inspect, catalog show, etc.)
windowrule {
    name = mcp-management-rules
    match:class = ^(mcp-management)$
    float = on
    size = 900 650
    center = on
}

# MCP Gateway terminal (long-running gateway process)
windowrule {
    name = mcp-gateway-rules
    match:class = ^(mcp-gateway)$
    float = on
    size = 1000 700
    center = on
}

# File picker dialogs → float + center
windowrule {
    name = file-picker-rules
    match:title = ^(Open File|Save File|Choose Files?|Select File|Select Folder|Save As)(.*)$
    float = on
    center = on
    size = 900 600
}

# Picture-in-Picture → float, pinned, bottom-right corner
windowrule {
    name = pip-rules
    match:title = ^(Picture.in.Picture)$
    float = on
    pin = on
    size = 400 225
    move = 100%-420 100%-245
}

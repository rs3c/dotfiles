##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/

# Ignore maximize requests from apps
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = xwayland-drag-fix
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    no_focus = on
}

# Dropdown terminal (yazi, btop, taskwarrior etc.)
windowrule {
    name = dropterm-rules
    match:class = ^(dropterm)$
    float = on
    size = 90% 80%
    center = on
}

# Floating utilities launched from waybar/rofi
windowrule {
    name = floating-waybar-rules
    match:class = ^(floating_waybar)$
    float = on
    size = 800 600
    center = on
}

windowrule {
    name = floating-generic-rules
    match:class = ^(floating)$
    float = on
    center = on
}

# AI response window
windowrule {
    name = askai-rules
    match:class = ^(askai)$
    float = on
    size = 800 600
    center = on
}

# Installer terminal
windowrule {
    name = installer-rules
    match:class = ^(installer)$
    float = on
    size = 900 650
    center = on
}

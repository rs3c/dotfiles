# ==========================
# ===  TMUX CONFIG       ===
# ==========================

# 1. Prefix Setup
# Change default prefix from Ctrl+b to Ctrl+Space (much easier to press)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 2. Easy window splitting
# Use | to split horizontally and - to split vertically
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# 3. Mouse support
# Allows you to click windows, resize panes, and scroll
set -g mouse on

# 4. Start windows and panes at 1, not 0
# Easier to reach on the keyboard
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# 5. Fix colors and allow terminal overrides
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 6. Vi mode for copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 7. Easy config reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux config reloaded!"

# 8. Status Bar colors (generated by pywal hook → ~/.cache/wal/colors-tmux.conf)
if-shell "test -f ~/.cache/wal/colors-tmux.conf" \
    "source-file ~/.cache/wal/colors-tmux.conf" \
    "set -g status-style 'bg=default,fg=white'; set -g status-left '#[fg=green,bold] #S '; set -g status-right '#[fg=blue]%H:%M '"

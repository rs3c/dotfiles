# ┌───────────────────────────────────────────┐
# │             Modern Neofetch               │
# │           Clean / Minimal / Icons         │
# └───────────────────────────────────────────┘

print_info() {
    prin "\n${cl4}┌──────────────────────────────────────┐"
    prin " ${cl6}   System Overview"
    prin "${cl4}└──────────────────────────────────────┘\n"

    info "   Host" model
    info "   CPU" cpu
    info " 󰍛  GPU" gpu
    info "   RAM" memory
    info "   Resolution" resolution
    # info " 󱈑  Battery" battery

    prin "\n${cl4}┌──────────────────────────────────────┐"
    prin " ${cl2}   Software"
    prin "${cl4}└──────────────────────────────────────┘\n"

    info "   Kernel" kernel
    info " 󰣇  Distro" distro
    info "   Desktop" de
    info " 󱂬  WM" wm
    info "   Shell" shell
    info "   Terminal" term
    info "   Font" term_font
    info "   Packages" packages
    # info "   Uptime" uptime

    prin "\n${cl4}────────────────────────────────────────"
    prin "${cl1} ●${cl2} ●${cl3} ●${cl4} ●${cl5} ●${cl6} ●${cl7} ●${cl0}"
}

# General options
kernel_shorthand="on"
distro_shorthand="off"
uptime_shorthand="on"
cpu_cores="logical"
memory_percent="on"
speed_shorthand="on"

# Colors
magenta="\033[1;35m"
green="\033[1;32m"
white="\033[1;37m"
blue="\033[1;34m"
red="\033[1;31m"
yellow="\033[1;33m"
cyan="\033[1;36m"
reset="\033[0m"

cl0="${reset}"
cl1="${magenta}"
cl2="${green}"
cl3="${white}"
cl4="${blue}"
cl5="${red}"
cl6="${yellow}"
cl7="${cyan}"

# Appearance
color_blocks="off"
bold="on"
separator=" → "
underline_enabled="off"

# Image (Kitty / Awww Wallpaper-Preview möglich)
image_backend="kitty"
image_source="wallpaper"     # nutzt das aktuelle Wallpaper
image_size="420px"
crop_mode="fit"

gap=2
xoffset=0
yoffset=0

stdout="off"

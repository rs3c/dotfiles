[general]
# wohin die generierte Monitor-Config geschrieben wird
destination = "$HOME/.config/hypr/modules/monitors.conf"

# Waybar restart logic: Reload if running, start if missing
post_apply_exec = "pgrep -x waybar >/dev/null && killall -SIGUSR2 waybar || waybar &"

# ---------- Profile 1: Docked (Deckel zu, nur externe Monitore) ----------
[profiles.docked_closed]
config_file = "hyprconfigs/docked_closed.conf"
config_file_type = "static"

[profiles.docked_closed.conditions]
# nur aktiv, wenn der Deckel zu ist
lid_state = "Closed"            # "Closed" oder "Opened" möglich

# externe Monitore per Description matchen (DP-XX Nummern können sich ändern!)
[[profiles.docked_closed.conditions.required_monitors]]
description = "Microstep Optix MAG24C 0000000000001"

[[profiles.docked_closed.conditions.required_monitors]]
description = "Microstep G274QPF-QD CC2H252C00385"

# ---------- Profile 2: Laptop Only (Dock weg, Deckel offen) ----------
[profiles.laptop_open]
config_file = "hyprconfigs/laptop_open.conf"
config_file_type = "static"

[profiles.laptop_open.conditions]
lid_state = "Opened"

# eDP-1 ändert sich nie, name-match ist hier safe
[[profiles.laptop_open.conditions.required_monitors]]
name = "eDP-1"

# ---------- Fallback (falls nichts matcht) ----------
[fallback_profile]
config_file = "hyprconfigs/fallback.conf"
config_file_type = "static"

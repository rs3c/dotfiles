# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Starship Prompt вҖ“ angelehnt an starship-primer
# Farben kommen aus dem Terminal (pywal)
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

format = """
$username$directory$git_branch$git_status$fill$python$nodejs$rust$time
$character
"""

add_newline = true
palette = "wal"

[palettes.wal]
color0 = "#000000"
color1 = "#111111"
color2 = "#222222"
color3 = "#333333"
color4 = "#444444"
color5 = "#555555"
color6 = "#666666"
color7 = "#777777"
color8 = "#888888"
color9 = "#999999"
color10 = "#aaaaaa"
color11 = "#bbbbbb"
color12 = "#cccccc"
color13 = "#dddddd"
color14 = "#eeeeee"
color15 = "#ffffff"


# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Left side
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[username]
show_always = true
style_user = "fg:black bg:bright-yellow"
style_root = "fg:black bg:red"
format = "[оӮ¶](fg:bright-yellow)[$user]($style)[оӮҙ](fg:bright-yellow) "

[directory]
truncation_length = 3
truncate_to_repo = false
style = "fg:bright-white bg:bright-blue"
format = "[оӮ¶](fg:bright-blue)[у°үӢ ](bg:bright-blue fg:black)[$path]($style)[оӮҙ](fg:bright-blue) "

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "fg:black bg:bright-cyan"
format = "[оӮ¶](fg:bright-cyan)[$symbol $branch]($style)[оӮҙ](fg:bright-cyan) "

[git_status]
style = "fg:black bg:bright-green"
format = "[оӮ¶](fg:bright-green)[$all_status$ahead_behind]($style)[оӮҙ](fg:bright-green) "
stashed = "пӮ„ "
modified = "п‘ҷ "
deleted = "п‘ҳ "
staged = "пҒҶ "
untracked = "пҒҷ "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Right side (langs / tools / time)
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[python]
symbol = "у°Ң "
style = "fg:black bg:bright-magenta"
format = "[оӮ¶](fg:bright-magenta)[$symbol $version]($style)[оӮҙ](fg:bright-magenta) "
pyenv_prefix = "venv"
disabled = false

[nodejs]
symbol = "у°Һҷ"
style = "fg:black bg:bright-green"
format = "[оӮ¶](fg:bright-green)[$symbol $version]($style)[оӮҙ](fg:bright-green) "
disabled = true  # auf true lassen, wenn du es selten brauchst

[rust]
symbol = "оһЁ"
style = "fg:black bg:bright-red"
format = "[оӮ¶](fg:bright-red)[$symbol $version]($style)[оӮҙ](fg:bright-red) "
disabled = true

[time]
disabled = false
time_format = "%H:%M"
style = "fg:black bg:bright-black"
format = "[оӮ¶](fg:bright-black)[пҗә $time]($style)[оӮҙ](fg:bright-black) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Prompt-Symbol
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вқҜ](bold bright-green)"
error_symbol   = "[вқҜ](bold bright-red)"
vicmd_symbol   = "[вқ®](bold bright-yellow)"
format = "$symbol "
